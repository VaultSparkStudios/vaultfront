name: Deploy Pages Bundle

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-pages.yml"
      - "index.html"
      - "package.json"
      - "resources/**"
      - "scripts/postbuild-pages.mjs"
      - "src/**"
      - "vite.config.ts"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy-pages:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      VITE_APP_BASE_PATH: /__GAME_SLUG__/
      VITE_CANONICAL_URL: https://vaultsparkstudios.com/__GAME_SLUG__/
      VITE_OG_IMAGE_URL: https://vaultsparkstudios.com/__GAME_SLUG__/images/cover.png
      VITE_DOMAIN: vaultsparkstudios.com
      VITE_GAME_SERVICE_ORIGIN: ${{ vars.GAME_SERVICE_ORIGIN || '' }}
      API_DOMAIN: ${{ vars.API_DOMAIN || '' }}
      GAME_ENV: prod
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build Pages bundle
        run: npm run build:pages

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: static

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
# Replace:
# - __GAME_SLUG__ with the lowercase public slug, e.g. vaultfront
#
# One-time repo setup required:
# - Go to Settings -> Pages and set Source to "GitHub Actions"
