add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://sdk.crazygames.com https://challenges.cloudflare.com https://www.googletagmanager.com https://static.cloudflareinsights.com https://cdn.intergient.com; style-src 'self' 'unsafe-inline'; connect-src 'self' wss: https:; img-src 'self' data: blob: https:; font-src 'self'; frame-src https://challenges.cloudflare.com https://*.crazygames.com; frame-ancestors 'self'; form-action 'self'; worker-src 'self' blob:; object-src 'none'; base-uri 'self';" always;
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "SAMEORIGIN" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), geolocation=(), microphone=(), payment=(), usb=()" always;
