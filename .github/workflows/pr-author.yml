name: 🧼 PR

on:
  pull_request_target:
    types: [opened, reopened]

permissions:
  pull-requests: write

jobs:
  auto-assign:
    name: Auto-assign author
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: toshimaru/auto-author-assign@da4dc1570b78bb0e1693ff703cd7077c6c2596f0
