name: VaultFront PR contract

on:
  merge_group:
    types:
      - checks_requested
  pull_request:
    types:
      - demilestoned
      - edited
      - milestoned
      - opened
      - synchronize

permissions:
  contents: read
  pull-requests: read

jobs:
  validate-description:
    name: Validate Description
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout trusted base validator
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          persist-credentials: false
      - uses: actions/github-script@v7
        with:
          script: |
            if (context.eventName === 'merge_group') {
              // Ignore merge_group events
              return;
            }

            const pr = context.payload.pull_request;
            const trustedAutomation = pr.user?.login === 'dependabot[bot]';
            if (trustedAutomation) {
              const files = await github.paginate(github.rest.pulls.listFiles, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                per_page: 100,
              });
              const path = require('node:path');
              const { validateDependabotFiles } = require(path.join(
                process.env.GITHUB_WORKSPACE,
                'scripts/lib/dependabot-pr-contract.cjs',
              ));
              const result = validateDependabotFiles({
                actorLogin: pr.user?.login,
                headRef: pr.head?.ref,
                files: files.map(file => file.filename),
              });
              if (!result.ok) {
                core.setFailed(result.errors.join('\n'));
                return;
              }
              console.log(
                `Dependabot ${result.ecosystem} machine contract verified for ${result.files.length} file(s); substantive CI remains required.`,
              );
              return;
            }

            const body = pr.body || '';

            const errors = [];

            // Check for ## Description section
            const descMatch = body.match(/^## Description:\s*\n([\s\S]*?)(?:^## |\Z)/m);
            if (!descMatch || descMatch[1].trim().length < 20) {
              errors.push('❌ Missing or short `## Description:` section.');
            }

            // Check all five boxes are checked
            const requiredBoxes = [
              /- \[x\] I have added screenshots for all UI updates/i,
              /- \[x\] I process any text displayed to the user through translateText\(\) and I\'ve added it to the en\.json file/i,
              /- \[x\] I have added relevant tests to the test directory/i,
              /- \[x\] I confirm I have thoroughly tested these changes and take full responsibility for any bugs introduced/i,
            ];

            for (const box of requiredBoxes) {
              if (!box.test(body)) {
                errors.push('❌ One or more checklist items are not checked.');
                break;
              }
            }

            if (errors.length > 0) {
              core.setFailed(errors.join('\n'));
            } else {
              console.log('✅ PR description and checklist look good.');
            }

  has-milestone:
    name: Has Milestone
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            if (context.eventName === 'merge_group') {
              // Ignore merge_group events
            } else if (context.eventName === 'pull_request') {
              if (context.payload.pull_request.user?.login === 'dependabot[bot]') {
                console.log('Milestones are a human planning contract; verified Dependabot PRs are exempt.');
                return;
              }
              // Get the pull request data
              const milestone = context.payload.pull_request.milestone;
              if (!milestone) {
                core.setFailed('❌ Reviewer must assign a Milestone to this Pull request before merging.');
                return;
              }
              console.log(`✅ Milestone found: ${milestone.title}`);
            } else {
              core.setFailed(`❌ Unknown event type ${context.eventName}.`);
            }
