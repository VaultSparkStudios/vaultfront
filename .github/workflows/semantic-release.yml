name: Semantic Release

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    name: Verify release toolchain
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 24.14.0
          cache: npm

      - run: npm ci --ignore-scripts

      - name: Load configured semantic-release plugins
        run: node --input-type=module -e "for (const p of ['semantic-release','@semantic-release/commit-analyzer','@semantic-release/release-notes-generator','@semantic-release/changelog','@semantic-release/github']) await import(p)"

  release:
    name: Release
    if: ${{ vars.SEMANTIC_RELEASE_ENABLED == 'true' }}
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 24.14.0
          cache: npm

      - run: npm ci --ignore-scripts

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
