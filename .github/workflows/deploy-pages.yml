name: Deploy VaultFront Launch Stub

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy-pages:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Upload launch stub artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-stub

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
