name: 🧪 CI

on:
  merge_group:
    types:
      - checks_requested
  pull_request:
  push:
    branches: [main]

permissions: {}

jobs:
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          submodules: false
      - name: Setup node
        uses: actions/setup-node@v7
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build-prod
      - uses: actions/upload-artifact@v7
        with:
          path: static/index.html
          retention-days: 1
  test:
    name: 🔬 Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          submodules: false
      - name: Setup node
        uses: actions/setup-node@v7
        with:
          node-version: 20
      - run: npm ci
      - run: npm run test:coverage
      - name: Verify source-of-truth contracts
        run: npm run verify:contracts
      - name: Enforce checked-in coverage ratchet
        run: node scripts/check-coverage-ratchet.mjs
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-summary
          path: coverage/coverage-summary.json
          retention-days: 7

  eslint:
    name: 🔍 ESLint
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npx eslint --format gha

  prettier:
    name: 🎨 Prettier
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run format:check

  security-audit:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm audit --audit-level=high

  bundle-size:
    name: 📦 Bundle Size
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [build]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run build-prod
      - name: Check bundle sizes
        run: npm run bundle:check
