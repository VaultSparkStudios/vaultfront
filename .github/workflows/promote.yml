name: Promote verified digest

on:
  workflow_dispatch:
    inputs:
      image_digest:
        description: "Immutable staging image digest (sha256:...)"
        required: true
        type: string
      staging_evidence_digest:
        description: "Digest recorded by staging verification; must match exactly"
        required: true
        type: string
      target_subdomain:
        description: "Production subdomain"
        required: true
        default: "play-vaultfront"
        type: string
      dry_run:
        description: "Validate promotion without connecting to production"
        required: true
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  promote:
    name: ${{ inputs.dry_run && 'Validate promotion' || 'Promote verified digest' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    env:
      DOMAIN: ${{ vars.DOMAIN }}
      SUBDOMAIN: ${{ inputs.target_subdomain }}
      FQDN: ${{ inputs.target_subdomain == 'main' && vars.DOMAIN || format('{0}.{1}', inputs.target_subdomain, vars.DOMAIN) }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate immutable staging evidence
        env:
          IMAGE_DIGEST: ${{ inputs.image_digest }}
          STAGING_DIGEST: ${{ inputs.staging_evidence_digest }}
        run: |
          set -euo pipefail
          [[ "$IMAGE_DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]
          [[ "$IMAGE_DIGEST" == "$STAGING_DIGEST" ]]
          node scripts/check-deploy-contract.mjs

      - name: Exercise dry-run promotion
        if: ${{ inputs.dry_run }}
        env:
          DEPLOY_DRY_RUN: "1"
          DEPLOY_HEALTH_URL: https://${{ env.FQDN }}/api/health
          DEPLOY_STAGING_ATTESTATION: ${{ inputs.staging_evidence_digest }}
          GHCR_REPO: ${{ vars.GHCR_REPO || 'vaultfront' }}
          GHCR_USERNAME: ${{ vars.GHCR_USERNAME || 'vaultsparkstudios' }}
        run: ./deploy.sh prod primary "${{ inputs.image_digest }}" "$SUBDOMAIN"

      - name: Log in to GitHub Container Registry
        if: ${{ !inputs.dry_run }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ vars.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Resolve promoted image revision
        if: ${{ !inputs.dry_run }}
        env:
          IMAGE_DIGEST: ${{ inputs.image_digest }}
          GHCR_REPO: ${{ vars.GHCR_REPO }}
          GHCR_USERNAME: ${{ vars.GHCR_USERNAME }}
        run: |
          set -euo pipefail
          IMAGE_REF="${GHCR_USERNAME}/${GHCR_REPO}@${IMAGE_DIGEST}"
          docker pull "$IMAGE_REF"
          EXPECTED_GIT_SHA="$(docker image inspect --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}' "$IMAGE_REF")"
          [[ "$EXPECTED_GIT_SHA" =~ ^[0-9a-f]{40}$ ]]
          echo "EXPECTED_GIT_SHA=$EXPECTED_GIT_SHA" >> "$GITHUB_ENV"

      - name: Create SSH private key
        if: ${{ !inputs.dry_run }}
        env:
          DEPLOY_SERVER_HOST: ${{ secrets.DEPLOY_SERVER_HOST }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s' "$DEPLOY_SSH_KEY" > ~/.ssh/id_rsa
          test -n "$DEPLOY_SERVER_HOST"
          ssh-keyscan -H "$DEPLOY_SERVER_HOST" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/id_rsa

      - name: Deploy promoted digest
        if: ${{ !inputs.dry_run }}
        env:
          APP_NAME: vaultfront
          API_KEY: ${{ secrets.API_KEY }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          DEPLOY_HEALTH_URL: https://${{ env.FQDN }}/api/health
          DEPLOY_REMOTE_USER: ${{ vars.DEPLOY_REMOTE_USER || 'vaultfront' }}
          DEPLOY_SERVER_HOST: ${{ secrets.DEPLOY_SERVER_HOST }}
          DEPLOY_STAGING_ATTESTATION: ${{ inputs.staging_evidence_digest }}
          GHCR_REPO: ${{ vars.GHCR_REPO }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_USERNAME: ${{ vars.GHCR_USERNAME }}
          OTEL_AUTH_HEADER: ${{ secrets.OTEL_AUTH_HEADER }}
          OTEL_EXPORTER_OTLP_ENDPOINT: ${{ secrets.OTEL_EXPORTER_OTLP_ENDPOINT }}
          SSH_KEY: ~/.ssh/id_rsa
          TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}
        run: ./deploy.sh prod primary "${{ inputs.image_digest }}" "$SUBDOMAIN"

      - name: Verify promoted revision
        if: ${{ !inputs.dry_run }}
        run: |
          set -euo pipefail
          for attempt in {1..30}; do
            if [[ "$(curl -fsS --max-time 5 "https://${FQDN}/commit.txt" || true)" == "$EXPECTED_GIT_SHA" ]]; then
              echo "Verified promoted revision ${EXPECTED_GIT_SHA}" >> "$GITHUB_STEP_SUMMARY"
              exit 0
            fi
            sleep 10
          done
          echo "Promotion revision verification timed out" >&2
          exit 1
